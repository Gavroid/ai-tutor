name: CI

# Объединённый CI: backend pytest + frontend tsc/lint/build.
# Триггеры: push в main, pull_request в main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Один одновременный запуск на ветку; новые коммиты отменяют старые.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Минимальные права: только чтение репозитория.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt apps/backend/requirements-dev.txt

      - name: Install system deps (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-rus

      - name: Install Python deps
        working-directory: apps/backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: apps/backend
        env:
          # conftest.py выставляет APP_SECRET_KEY, APP_ENV, DATABASE_URL, CORS_ORIGINS.
          # Дублировать их здесь НЕ нужно — единственное, что conftest не делает,
          # это AI_API_KEY (нужен для MockProvider: key содержит "mock").
          AI_API_KEY: "mock-key-for-ci"
          UPLOAD_DIR: "/tmp/ai-tutor-test-uploads"
        run: |
          . .venv/bin/activate
          pytest --tb=short -q

  frontend:
    name: Frontend (tsc + lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install deps
        working-directory: apps/frontend
        run: npm ci

      - name: Type check
        working-directory: apps/frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: "https://example.com/api"
        run: NEXT_TELEMETRY_DISABLED=1 npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: apps/frontend/.next/
          retention-days: 7