name: Deploy Test

# Sprint 3.5.3 — минимальный workflow чтобы проверить триггеры

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hello:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hello
        run: |
          echo "🚀 Deploy Test workflow триггернулся!"
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF"