name: Deploy to production

# Sprint 3.5 — CI/CD через GitHub Actions.
#
# Архитектура:
#   1. Workflow использует SSH-ключ с command="/opt/ai-tutor/deploy/release/deploy-from-ci.sh"
#      на проде → ключ физически может вызвать ТОЛЬКО эту одну команду.
#   2. deploy-from-ci.sh на проде: rsync staging → release dir → deploy.sh → smoke.sh.
#   3. Не делает git pull (git remote на проде нет), не делает docker compose build
#      напрямую (использует наш deploy.sh).
#
# Триггеры:
#   - push в main (если изменены apps/, deploy/, .github/workflows/)
#   - workflow_dispatch (ручной запуск)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "deploy/**"
      - ".github/workflows/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # НЕ отменять запущенный deploy — может оставить прод в сломанном состоянии

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production  # Можно добавить required reviewers в Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        if: env.PRODUCTION_SSH_KEY != ''
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Deploy to production
        if: env.PRODUCTION_SSH_KEY != ''
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST || '192.168.1.86' }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          echo "🚀 Deploy started: $(date -u)"
          echo "   repo: $GITHUB_REPOSITORY"
          echo "   commit: $GITHUB_SHA"
          echo "   target: $PRODUCTION_HOST:$PRODUCTION_SSH_PORT"

          # Создаём staging dir на проде (через SSH — но ключ с command= не даёт
          # делать произвольные команды. Поэтому используем обходной путь:
          # ssh-agent добавляет ключ, ssh запускает authorized_keys-принуждённую
          # команду, и webfactory/ssh-agent подменяет её через ProxyCommand.
          #
          # Решение: используем rsync через ssh — rsync сам делает транспорт через SSH.
          # Если ключ с command="...", rsync всё равно работает, потому что
          # command выполняется на remote, а rsync уже на клиенте видит
          # stdout/stderr от command как "общение".
          #
          # Но наш command="/opt/ai-tutor/deploy/release/deploy-from-ci.sh ..."
          # не принимает rsync протокол. Поэтому staging создаём через scp
          # с уже распакованным tar-архивом.

          # 1) Создаём tar.gz из workspace
          echo "📦 Creating source tarball..."
          tar -czf /tmp/ai-tutor-source.tar.gz \
            --exclude='.git' --exclude='.venv' --exclude='__pycache__' \
            --exclude='node_modules' --exclude='.next' --exclude='uploads' \
            --exclude='*.log' --exclude='.pytest_cache' \
            --exclude='.ssh' --exclude='screenshots' \
            --exclude='.ssh_actions_deploy_key_FOR_GITHUB.txt' \
            --exclude='.copy-ssh-key-to-github.sh' \
            --exclude='.gitignore.bak' \
            .

          # 2) Копируем tar.gz на прод через scp (ssh-agent добавил ключ, scp использует ssh)
          echo "📤 Uploading source to $PRODUCTION_HOST..."
          STAGING_REMOTE="/tmp/ai-tutor-ci-staging.tar.gz"
          scp -P "$PRODUCTION_SSH_PORT" -o StrictHostKeyChecking=no \
            /tmp/ai-tutor-source.tar.gz \
            "root@$PRODUCTION_HOST:$STAGING_REMOTE"

          # 3) На проде: распаковываем в staging dir и вызываем deploy-from-ci.sh.
          #    command="..." выполнит наш скрипт с $1 = /tmp/ai-tutor-ci-staging.tar.gz.
          echo "🚀 Triggering deploy-from-ci.sh on production..."
          ssh -p "$PRODUCTION_SSH_PORT" -o StrictHostKeyChecking=no \
            "root@$PRODUCTION_HOST" \
            "set -e
             rm -rf /tmp/ai-tutor-ci-staging
             mkdir -p /tmp/ai-tutor-ci-staging
             tar -xzf $STAGING_REMOTE -C /tmp/ai-tutor-ci-staging
             /opt/ai-tutor/deploy/release/deploy-from-ci.sh /tmp/ai-tutor-ci-staging
             rm -rf /tmp/ai-tutor-ci-staging $STAGING_REMOTE"

          echo ""
          echo "✅ Deploy completed successfully"

      - name: Healthcheck post-deploy
        if: success() && env.PRODUCTION_SSH_KEY != ''
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST || '192.168.1.86' }}
        run: |
          sleep 5
          code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "https://$PRODUCTION_HOST/health")
          echo "Health check: $code"
          if [ "$code" != "200" ]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Notify success
        if: success() && env.PRODUCTION_SSH_KEY != ''
        run: |
          echo "✅ Production deploy OK"
          echo "URL: https://${{ secrets.PRODUCTION_HOST || '192.168.1.86' }}"

      - name: Notify failure
        if: failure() && env.PRODUCTION_SSH_KEY != ''
        run: |
          echo "❌ Production deploy FAILED"
          echo "Check: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"