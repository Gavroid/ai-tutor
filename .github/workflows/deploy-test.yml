name: Deploy

# Sprint 3.5.3 — минимальный test workflow
# Цель: проверить триггерится ли Deploy workflow на push в deploy/**

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hello
        run: |
          echo "🚀 Deploy workflow триггернулся!"
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Triggered at: $(date -u)"

      - name: Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=🚀 Deploy workflow триггернулся: ${GITHUB_SHA::7}" \
              -d "parse_mode=Markdown" \
              -o /dev/null || true
          fi