services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tutor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutor}
      POSTGRES_DB: ${POSTGRES_DB:-tutor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutor} -d ${POSTGRES_DB:-tutor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Наружу НЕ публикуется — только во внутренней сети.

  # Init-job: устанавливает пароль пользователю после первого запуска БД.
  # Выполняется ОДИН раз (маркер-файл в volume), затем остаётся в состоянии "exited".
  db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-tutor}
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-tutor}
      PGDATABASE: ${POSTGRES_DB:-tutor}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/init:ro
    networks:
      - internal
    restart: "no"
    entrypoint: ["sh", "-c", "if [ ! -f /var/lib/postgresql/data/.ai-tutor-pw-set ]; then psql -c \"ALTER USER \\\"$$PGUSER\\\" WITH PASSWORD '$$PGPASSWORD';\" && touch /var/lib/postgresql/data/.ai-tutor-pw-set && echo 'Password set'; else echo 'Password already set, skipping'; fi"]

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ../data/curriculum:/app/data/curriculum:ro
    # Backend healthcheck
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - external
    expose:
      - "8000"

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - external
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/nginx/certs:ro
    networks:
      - external

  # Redis — для multi-worker rate limit и сессий.
  # Опционально: если REDIS_URL не задан в backend env, используется in-memory.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

  # Prometheus — scrape /metrics с backend (Sprint 9.5).
  # Только внутри сети — НЕ публикуется наружу.
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=2GB'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # Grafana — UI для метрик (Sprint 9.5).
  # Bind на localhost:3001 — доступ ТОЛЬКО через nginx proxy (или SSH-tunnel).
  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_LOG_LEVEL: warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  uploads:
  redisdata:
  grafanadata:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
