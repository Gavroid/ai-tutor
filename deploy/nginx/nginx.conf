events {}
http {
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Безопасные дефолты
  server_tokens off;
  client_max_body_size 25m;

  # Anti-DDoS на уровне nginx
  # Для auth endpoints — 5 req/sec на IP (≈5 реальных логинов за 5с — поток нормальный)
  # Для API — 30 req/sec на IP
  # Для WS — открыто (long-lived)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_status 429;

  # SSL настройки (self-signed для LXC; для production заменить на Let's Encrypt)
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  upstream backend_upstream {
    server backend:8000;
  }
  upstream frontend_upstream {
    server frontend:3000;
  }
  upstream grafana_upstream {
    server grafana:3000;
  }

  # Редирект HTTP → HTTPS (отключается, если сертификата нет)
  server {
    listen 80 default_server;
    server_name _;

    location = /manifest.json {
      default_type application/manifest+json;
      return 200 '{"name":"AI-репетитор 7 класса","short_name":"Репетитор","description":"Персональный AI-репетитор для школьной программы 7 класса","start_url":"/","display":"standalone","background_color":"#f8fafc","theme_color":"#0284c7","orientation":"portrait","icons":[{"src":"/icon.svg","sizes":"any","type":"image/svg+xml","purpose":"any maskable"}]}';
    }

    location = /icon.svg {
      default_type image/svg+xml;
      return 200 '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><rect width="192" height="192" rx="32" fill="url(#g)"/><text x="96" y="118" text-anchor="middle" font-family="sans-serif" font-size="120" font-weight="700" fill="#fff">7</text><text x="96" y="156" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="500" fill="#bae6fd">AI</text></svg>';
    }

    location = /sw.js {
      default_type application/javascript;
      return 200 '// минимальный service worker — no-op для MVP';
      add_header Cache-Control "no-cache";
    }

    # Если есть SSL — редиректим на HTTPS; если нет — проксируем напрямую.
    location / {
      # Если нет сертификата, nginx сам не запустится 443-блок, так что безопасно
      # делать 301 редирект только если сертификат есть.
      if (-f /etc/nginx/certs/fullchain.pem) {
        return 301 https://$host$request_uri;
      }
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
      if (-f /etc/nginx/certs/fullchain.pem) {
        return 301 https://$host$request_uri;
      }
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      if (-f /etc/nginx/certs/fullchain.pem) {
        return 301 https://$host$request_uri;
      }
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /ws/ {
      if (-f /etc/nginx/certs/fullchain.pem) {
        return 301 https://$host$request_uri;
      }
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location /health {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    # Pilot Core Stage 1 — readiness probe (truthful DB state) without auth.
    location /ready {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    # Pilot Core Stage 1 — Prometheus scrape target.
    location /metrics {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    # Sprint 9.5 — Grafana через nginx с IP-restrict (только LAN).
    # Grafana dashboard с метриками Prometheus (Sprint 9.5).
    location ^~ /grafana/ {
      # TODO: добавить auth_basic когда владелец сделает admin-only
      # Пока только LAN allow + внутренняя сеть Docker.
      allow 192.168.0.0/16;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      deny all;
      rewrite ^/grafana/(.*)$ /$1 break;
      proxy_pass http://grafana_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }
  }

  # HTTPS сервер (только если есть сертификаты)
  server {
    listen 443 ssl;
    # http2 on;  # отключено: nginx при HTTP/2 не передаёт WebSocket Upgrade.
                # Для prod включить и вынести /ws/ на отдельный server (или использовать h2c с envoy).
    server_name _;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # HSTS (включить когда будет реальный домен)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # WebSocket — отдельный блок с upgrade
    location /ws/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
    }

    location /health {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    # Pilot Core Stage 1 — readiness probe (truthful DB state) without auth.
    location /ready {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    # Pilot Core Stage 1 — Prometheus scrape target.
    location /metrics {
      proxy_pass http://backend_upstream;
      access_log off;
    }

    location = /manifest.json {
      default_type application/manifest+json;
      return 200 '{"name":"AI-репетитор 7 класса","short_name":"Репетитор","description":"Персональный AI-репетитор для школьной программы 7 класса","start_url":"/","display":"standalone","background_color":"#f8fafc","theme_color":"#0284c7","orientation":"portrait","icons":[{"src":"/icon.svg","sizes":"any","type":"image/svg+xml","purpose":"any maskable"}]}';
    }

    location = /icon.svg {
      default_type image/svg+xml;
      return 200 '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><rect width="192" height="192" rx="32" fill="url(#g)"/><text x="96" y="118" text-anchor="middle" font-family="sans-serif" font-size="120" font-weight="700" fill="#fff">7</text><text x="96" y="156" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="500" fill="#bae6fd">AI</text></svg>';
    }

    location = /sw.js {
      default_type application/javascript;
      return 200 '// минимальный service worker — no-op для MVP';
      add_header Cache-Control "no-cache";
    }

    # Sprint 9.5 — Grafana (HTTPS). IP-restrict: LAN + внутренние Docker сети.
    location ^~ /grafana/ {
      allow 192.168.0.0/16;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      deny all;
      rewrite ^/grafana/(.*)$ /$1 break;
      proxy_pass http://grafana_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}