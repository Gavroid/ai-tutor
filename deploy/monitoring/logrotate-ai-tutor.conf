# Sprint 3.6.2 — logrotate для AI Tutor логов.
# Ротация: размер > 10M ИЛИ возраст > 7 дней (ежедневно).
# Хранить 5 архивов (gzip), затем удалять.
# su root root — потому что /var/log world-writable в LXC.

/var/log/ai-tutor-*.log {
    su root root
    daily
    missingok
    rotate 5
    size 10M
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Ничего не делаем — сервисы пишут в файлы, не переоткрывают
        true
    endscript
}